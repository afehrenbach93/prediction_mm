# Render Blueprint — prediction-mm (CLOB reward-yield + quoter).
#
# Deep-dive deploy path:
#   1) cron: daily clob_yield_scan (stability study)
#   2) worker: clob_runner (shadow until micro-pilot)
# US poly_runner kept shadow-only / optional.

services:
  - type: cron
    name: clob-yield-scan-daily
    runtime: python
    schedule: "0 15 * * *"          # 15:00 UTC daily
    buildCommand: pip install -r requirements.txt
    startCommand: PYTHONPATH=. python scripts/clob_yield_scan.py --budget 500 --top 250 && PYTHONPATH=. python scripts/clob_stability.py --min-days 1 --min-yield 3
    envVars: []

  - type: worker
    name: clob-mm
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: PYTHONPATH=. python clob_runner.py
    envVars:
      - key: CLOB_MODE
        value: "shadow"
      - key: CLOB_BUDGET_PER_MARKET
        value: "75"
      - key: CLOB_MAX_MARKETS
        value: "3"
      - key: CLOB_SPREAD_FRACTION
        value: "0.5"
      - key: CLOB_MIN_HOURS_TO_END
        value: "168"
      - key: CLOB_PRIVATE_KEY
        sync: false
      - key: CLOB_API_KEY
        sync: false
      - key: CLOB_SECRET
        sync: false
      - key: CLOB_PASS_PHRASE
        sync: false
      - key: CLOB_FUNDER
        sync: false

  - type: worker
    name: polymarket-mm
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python poly_runner.py
    envVars:
      - key: BOT_MODE
        value: "shadow"
      - key: POLYMARKET_API_KEY
        sync: false
      - key: POLYMARKET_SECRET
        sync: false
