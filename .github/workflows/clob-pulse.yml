# Regular CLOB market pulse against clob.polymarket.com (deep-dive §7.1).
# Twice daily so weekend vs weekday books are both sampled.
#
# IMPORTANT (P0): do NOT commit pulse artifacts to the deploy/default branch.
# Render autodeploy on that branch would restart polymarket-mm / clob-mm and
# cancel resting quotes. Artifacts go to:
#   1) GitHub Actions artifacts
#   2) dedicated `data` branch
#   3) Supabase clob_pulse_snapshots when SUPABASE_* secrets are set
name: clob-pulse

on:
  schedule:
    - cron: "0 0 * * *"    # 00:00 UTC
    - cron: "0 15 * * *"   # 15:00 UTC (matches deep-dive snapshot hour)
  workflow_dispatch:
    inputs:
      top:
        description: "Top-N by daily_rate to score"
        default: "250"
      budget:
        description: "Hypothetical budget USD"
        default: "500"

permissions:
  contents: write

jobs:
  pulse:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Run CLOB pulse (scan + stability + summary + recon)
        env:
          PYTHONPATH: ${{ github.workspace }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          python scripts/clob_pulse.py \
            --budget "${{ github.event.inputs.budget || '500' }}" \
            --top "${{ github.event.inputs.top || '250' }}" \
            --workers 8 \
            --min-days 5 \
            --min-yield 3

      - name: Upload pulse artifacts
        uses: actions/upload-artifact@v4
        with:
          name: clob-pulse-${{ github.run_id }}
          path: |
            data/clob_scans/latest.csv
            data/clob_scans/pilot_universe.csv
            data/clob_scans/pulse.json
            data/clob_scans/pulse.md
            data/clob_scans/reward_recon.json
            data/clob_scans/????-??-??.csv
          if-no-files-found: error

      # Push ONLY to the `data` branch — never to the deploy/default branch.
      - name: Publish scans to data branch (not deploy branch)
        run: |
          set -euo pipefail
          STAMP=$(date -u +%Y-%m-%dT%H:%MZ)
          SCAN_SRC="${GITHUB_WORKSPACE}/data/clob_scans"
          git config --global user.name "clob-pulse-bot"
          git config --global user.email "clob-pulse-bot@users.noreply.github.com"

          TMP=$(mktemp -d)
          cd "$TMP"
          git clone --depth 1 --branch data \
            "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" repo \
            || {
              mkdir repo && cd repo && git init && git checkout --orphan data
              git remote add origin \
                "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
              cd ..
            }
          cd repo
          mkdir -p data/clob_scans
          cp -a "$SCAN_SRC"/. data/clob_scans/
          git add data/clob_scans
          if git diff --staged --quiet; then
            echo "No scan changes on data branch"
          else
            git commit -m "clob-pulse: ${STAMP} market snapshot"
            git push -u origin HEAD:data
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
